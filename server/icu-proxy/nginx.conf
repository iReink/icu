server {
    listen 80;
    listen [::]:80;
    server_name icu-proxy.185-92-181-109.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/icu-proxy;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name icu-proxy.185-92-181-109.sslip.io;

    ssl_certificate /etc/letsencrypt/live/icu-proxy.185-92-181-109.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icu-proxy.185-92-181-109.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;
    proxy_connect_timeout 20s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /live-share {
        return 301 /live-share/;
    }

    location /live-share/ {
        alias /var/www/icu-live-share/;
        index index.html;
        add_header Cache-Control "no-store" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /tiles/osm/ {
        rewrite ^/tiles/osm/(.*)$ /$1 break;
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header User-Agent "ICU/1.2 (+https://vbaranov.tech)";
        proxy_pass https://tile.openstreetmap.org;
    }

    location /tiles/geoapify/ {
        rewrite ^/tiles/geoapify/(.*)$ /v1/tile/osm-carto/$1 break;
        proxy_ssl_server_name on;
        proxy_set_header Host maps.geoapify.com;
        proxy_set_header User-Agent "ICU/1.2 (+https://vbaranov.tech)";
        proxy_pass https://maps.geoapify.com;
    }

    location /supabase/ {
        rewrite ^/supabase/(.*)$ /$1 break;
        proxy_ssl_server_name on;
        proxy_set_header Host jjinirtbtgkyesewvyux.supabase.co;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass https://jjinirtbtgkyesewvyux.supabase.co;
    }

    location /functions/v1/ {
        proxy_ssl_server_name on;
        proxy_set_header Host jjinirtbtgkyesewvyux.supabase.co;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass https://jjinirtbtgkyesewvyux.supabase.co;
    }

    location / {
        return 404;
    }
}
